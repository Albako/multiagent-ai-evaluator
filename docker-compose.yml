x-gpu-defaults: &gpu-defaults
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: multiagent_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    profiles: ["pc0"]

  manager_worker1:
    build:
      context: ./backend
      dockerfile: Dockerfile.manager
    container_name: model_manager_pc1
    <<: *gpu-defaults
    ports:
      - "8001:8001"
    volumes:
      - ./models:/models:z
    env_file:
      - .env
    environment:
      - MANAGER_PORT=8001
      - NODE_ROLE=worker1
    restart: unless-stopped
    profiles: ["pc1"]

  manager_worker2:
    build:
      context: ./backend
      dockerfile: Dockerfile.manager
    container_name: model_manager_pc2
    <<: *gpu-defaults
    ports:
      - "8002:8002"
    volumes:
      - ./models:/models:z
    env_file:
      - .env
    environment:
      - MANAGER_PORT=8002
      - NODE_ROLE=worker2
    restart: unless-stopped
    profiles: ["pc2"]

  manager_judge:
    build:
      context: ./backend
      dockerfile: Dockerfile.manager
    container_name: model_manager_pc3
    <<: *gpu-defaults
    ports:
      - "8003:8003"
    volumes:
      - ./models:/models:z
    env_file:
      - .env
    environment:
      - MANAGER_PORT=8003
      - NODE_ROLE=judge
    restart: unless-stopped
    profiles: ["pc3"]
